<div class="row">
    <div class="col-2">
        <p>{{courseName}}</p>

    </div>

    <div class="col-3">
        <span>{{courseName}}</span>

    </div>
    <div class="col-2">
        {{courseDuration}}
    </div>
    <div class="{{myClassName}}">
       <input type="text" value="{{courseDuration}}">
    </div>
    <div class="col-2">
        <input type="{{myInputType}}"/>
    </div>          

</div>

<div class="row">
    <div class="col-2">
        <input [type]="myInputType" />
    </div>
    <div class="col-3">
        <input type="text" [minLength]="minChar" [maxLength]="maxCharAllowed" />

    </div>
    <div [class]="myClassName">
        <textarea [rows]="minChar"></textarea>
    </div>
    <div class="col-3">
        <input type="text" [value]="courseName"/>
    </div>

</div>

<div class="row">
    <div class="col-2">
        <button class="btn btn-primary" (click)="showWelcomeText()">Welcome</button>
    </div>
    <div class="col-3">
        <button (click)="showMessage('Java')" class="btn btn-warning mx-2">Java</button>
        <button (click)="showMessage('Angular')"  class="btn btn-warning mx-2">Angular</button>
        <button  (click)="showMessage('React')" class="btn btn-warning mx-2">React</button>
        <button  (click)="showMessage('Docker')" class="btn btn-warning mx-2">Docker</button>
    </div>

    <div class="col-6">
        <select (change)="onCityChange()">
            <option>Pune</option>
             <option>Mumbai</option>
              <option>Jaipur</option>
        </select>
    </div>

    <div (mouseenter)="onMouseEnter()" class="bg bg-danger" style="width: 200px; height: 200px;"></div>

</div>
